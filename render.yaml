services:
  - type: web
    name: internsync-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Set this to a Postgres connection string (e.g. from Neon.tech's free tier).
      # Render's free web services don't support persistent disks, so SQLite's
      # file would reset on every restart -- Postgres keeps data across deploys.
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
