services:
  # Note: renaming this only changes the dashboard label, not the live
  # .onrender.com subdomain (fixed at creation: internsync-api.onrender.com).
  - type: web
    name: teamsync-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Pin to a version with prebuilt wheels for pydantic-core/psycopg2 --
      # Render's default (3.14) is too new and forces a source build that
      # fails in their read-only build sandbox.
      - key: PYTHON_VERSION
        value: 3.12.7
      # Set this to a Postgres connection string (e.g. from Neon.tech's free tier).
      # Render's free web services don't support persistent disks, so SQLite's
      # file would reset on every restart -- Postgres keeps data across deploys.
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
